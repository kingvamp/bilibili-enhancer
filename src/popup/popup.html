<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>B站增强设置</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="header">
        <div style="display: flex; align-items: baseline;">
            <h2 style="margin-right: 8px;">Bilibili Enhancer</h2>
            <a href="#" id="github-star" style="font-size: 12px; text-decoration: none; color: #888;"
                title="前往 GitHub 仓库">点亮⭐</a>
        </div>
        <span class="version" id="app-version"></span>
    </div>

    <div class="container">
        <div class="section-group">
            <div class="group-title">播放与常规</div>

            <div class="setting-item">
                <div class="label-box">
                    <span>显示毫秒时间</span>
                    <span class="tooltip-icon" data-tooltip="在播放器进度条右侧显示精确到毫秒的时间戳">?</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-ms">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item column-layout">
                <div class="label-box">
                    <span>封面预览大小</span>
                </div>
                <div class="segmented-control">
                    <label>
                        <input type="radio" name="cover-size" value="off">
                        <span class="seg-item">关闭</span>
                    </label>
                    <label>
                        <input type="radio" name="cover-size" value="small">
                        <span class="seg-item">小</span>
                    </label>
                    <label>
                        <input type="radio" name="cover-size" value="medium">
                        <span class="seg-item">中</span>
                    </label>
                    <label>
                        <input type="radio" name="cover-size" value="large">
                        <span class="seg-item">大</span>
                    </label>
                </div>
            </div>
        </div>

        <div class="section-group">
            <div class="group-title">缩略图信息增强</div>

            <div class="setting-item column-layout">
                <div class="label-box">
                    <span>收藏/点赞状态显示</span>
                </div>
                <div class="segmented-control" id="status-mode-group">
                    <label>
                        <input type="radio" name="status-mode" value="off">
                        <span class="seg-item">关闭</span>
                    </label>
                    <label>
                        <input type="radio" name="status-mode" value="text">
                        <span class="seg-item">文字</span>
                    </label>
                    <label>
                        <input type="radio" name="status-mode" value="triangle">
                        <span class="seg-item">角标</span>
                    </label>
                </div>
            </div>

            <div class="setting-item">
                <span>显示分辨率 (4K/1080P)</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-thumb-res">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <span>显示分P数量</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-thumb-pcount">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item">
                <span>屏蔽充电专属视频</span>
                <label class="switch">
                    <input type="checkbox" id="toggle-hide-charging">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="section-group">
            <div class="group-title">下载设置</div>

            <div class="setting-item">
                <div class="label-box">
                    <span>启用视频下载</span>
                    <span class="tooltip-icon" data-tooltip="需启动Bilibili Downloader才能进行下载">?</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-download-video">
                    <span class="slider"></span>
                </label>
            </div>

            <div class="setting-item column-layout">
                <div class="label-box">
                    <span>下载完成自动收藏</span>
                    <span class="tooltip-icon" data-tooltip="下载完成后自动存入此收藏夹，留空则不开启">?</span>
                </div>
                <input type="text" id="input-fav-id" placeholder="请输入收藏夹ID (纯数字)"
                    style="width: 100%; padding: 6px; margin-top: 8px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 12px;">
            </div>
        </div>

        <div class="section-group">
            <div class="group-title">社交互动</div>

            <div class="setting-item">
                <div class="label-box">
                    <span>高亮已关注UP主</span>
                    <span class="tooltip-icon" data-tooltip="在评论区、动态列表等位置，将已关注UP主的名字显示为醒目颜色">?</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="toggle-highlight">
                    <span class="slider"></span>
                </label>
            </div>

            <button id="btn-force-update" class="btn primary-btn">
                <span class="icon">🔄</span> 同步关注列表
            </button>
        </div>
    </div>

    <div class="footer">
        修改即时生效，无需刷新
    </div>

    <script src="popup.js"></script>
</body>

</html>
