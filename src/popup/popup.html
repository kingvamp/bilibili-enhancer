<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="container">
        <h2>B站增强设置</h2>
        <div class="setting-item">
            <span>显示毫秒时间</span>
            <label class="switch">
                <input type="checkbox" id="toggle-ms">
                <span class="slider round"></span>
            </label>
        </div>
        <div class="setting-item">
            <span>合集封面预览</span>
            <select id="select-cover-size" class="custom-select">
                <option value="off">关闭</option>
                <option value="small">小 (320px)</option>
                <option value="medium">中 (480px)</option>
                <option value="large">大 (640px)</option>
            </select>
        </div>
        <div class="footer">实时生效</div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
